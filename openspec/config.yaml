# OpenSpec Configuration

schema: spec-driven

# Project-specific settings
project:
  name: Note Sync Now
  description: End-to-end encrypted note synchronization system

# Integration with existing specs
# Your existing specs/ directory contains:
# - product/ - Product requirements
# - rfc/ - Technical design documents
# - api/ - API interface definitions
# - db/ - Database schema
# - testing/ - Testing strategy

# OpenSpec creates changes in openspec/changes/
# After implementation, changes are archived to openspec/changes/archive/
# Delta specs can be merged into openspec/specs/ (or linked to specs/)

# For this project, we use two-tier specs:
# 1. specs/ - Stable, approved specifications (Single Source of Truth)
# 2. openspec/specs/ - Delta specs from ongoing changes

# Commands available:
# /opsx:propose - Create a new change proposal
# /opsx:explore - Explore ideas before committing
# /opsx:apply - Implement tasks from a change
# /opsx:archive - Archive a completed change
